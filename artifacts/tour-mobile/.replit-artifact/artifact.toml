kind = "mobile"
previewPath = "/tour-mobile/"
title = "TourFlow Mobile"
version = "1.0.0"
id = "artifacts/tour-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/tour-mobile/" ]
localPort = 22753

[services.development]
run = "pnpm --filter @workspace/tour-mobile run serve"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tour-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tour-mobile", "run", "serve" ]

[services.env]
PORT = "22753"
BASE_PATH = "/tour-mobile/"
