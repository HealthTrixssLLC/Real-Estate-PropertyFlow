openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TourFlow Real Estate Tour Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: buyers
    description: Buyer management
  - name: tours
    description: Tour management
  - name: properties
    description: Property management
  - name: tourStops
    description: Tour stop management
  - name: showings
    description: Showing request management
  - name: voiceNotes
    description: Voice note recording and transcription
  - name: admin
    description: Admin AI configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ── Buyers ──────────────────────────────────────────────────────────────────
  /buyers:
    get:
      tags: [buyers]
      operationId: listBuyers
      summary: List all buyers
      responses:
        '200':
          description: List of buyers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerListResponse'
    post:
      tags: [buyers]
      operationId: createBuyer
      summary: Create a new buyer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuyerRequest'
      responses:
        '201':
          description: Buyer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerResponse'

  /buyers/{buyerId}:
    get:
      tags: [buyers]
      operationId: getBuyer
      summary: Get a buyer by ID
      parameters:
        - $ref: '#/components/parameters/BuyerIdParam'
      responses:
        '200':
          description: Buyer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerResponse'
        '404':
          description: Buyer not found
    put:
      tags: [buyers]
      operationId: updateBuyer
      summary: Update a buyer
      parameters:
        - $ref: '#/components/parameters/BuyerIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBuyerRequest'
      responses:
        '200':
          description: Buyer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerResponse'
    delete:
      tags: [buyers]
      operationId: deleteBuyer
      summary: Delete a buyer
      parameters:
        - $ref: '#/components/parameters/BuyerIdParam'
      responses:
        '204':
          description: Buyer deleted

  # ── Standalone Properties ────────────────────────────────────────────────────
  /properties:
    get:
      tags: [properties]
      operationId: listProperties
      summary: List all properties
      responses:
        '200':
          description: List of properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListResponse'
    post:
      tags: [properties]
      operationId: createProperty
      summary: Create a new property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePropertyBody'
      responses:
        '201':
          description: Property created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'

  /properties/{propertyId}:
    get:
      tags: [properties]
      operationId: getProperty
      summary: Get a property by ID
      parameters:
        - $ref: '#/components/parameters/PropertyIdParam'
      responses:
        '200':
          description: Property found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '404':
          description: Property not found
    put:
      tags: [properties]
      operationId: updateProperty
      summary: Update a property
      parameters:
        - $ref: '#/components/parameters/PropertyIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyBody'
      responses:
        '200':
          description: Property updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '404':
          description: Property not found
    delete:
      tags: [properties]
      operationId: deleteProperty
      summary: Delete a property
      parameters:
        - $ref: '#/components/parameters/PropertyIdParam'
      responses:
        '204':
          description: Deleted

  # ── Tours ───────────────────────────────────────────────────────────────────
  /tours:
    get:
      tags: [tours]
      operationId: listTours
      summary: List all tours for the current agent
      responses:
        '200':
          description: List of tours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourListResponse'
    post:
      tags: [tours]
      operationId: createTour
      summary: Create a new tour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTourRequest'
      responses:
        '201':
          description: Tour created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'

  /tours/{tourId}:
    get:
      tags: [tours]
      operationId: getTour
      summary: Get a tour with all its stops
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      responses:
        '200':
          description: Tour found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourDetailResponse'
        '404':
          description: Tour not found
    put:
      tags: [tours]
      operationId: updateTour
      summary: Update a tour
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTourRequest'
      responses:
        '200':
          description: Tour updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'
    delete:
      tags: [tours]
      operationId: deleteTour
      summary: Delete a tour
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      responses:
        '204':
          description: Tour deleted

  /tours/{tourId}/properties:
    post:
      tags: [tours]
      operationId: addPropertyToTour
      summary: Add a property to a tour (creates tour stop)
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPropertyToTourRequest'
      responses:
        '201':
          description: Property added to tour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopResponse'

  /tours/{tourId}/optimize:
    post:
      tags: [tours]
      operationId: optimizeTourRoute
      summary: Optimize the route order for a tour
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizeRouteRequest'
      responses:
        '200':
          description: Route optimized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizeRouteResponse'

  /tours/{tourId}/stops/order:
    put:
      tags: [tours]
      operationId: reorderTourStops
      summary: Save a manually reordered stop sequence
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderStopsRequest'
      responses:
        '200':
          description: Order saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tours/{tourId}/skip-stop:
    post:
      tags: [tours]
      operationId: skipTourStop
      summary: Skip a stop and reroute to the next best stop
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkipStopRequest'
      responses:
        '200':
          description: Stop skipped, next stop returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkipStopResponse'

  /tours/{tourId}/publish:
    post:
      tags: [tours]
      operationId: publishTour
      summary: Publish a tour to mobile
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      responses:
        '200':
          description: Tour published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'

  /tours/{tourId}/readiness:
    get:
      tags: [tours]
      operationId: getTourReadiness
      summary: Get the readiness summary for a tour
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      responses:
        '200':
          description: Tour readiness summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourReadinessResponse'

  /tours/{tourId}/generate-summary:
    post:
      tags: [tours]
      operationId: generateTourSummary
      summary: Generate an AI end-of-tour summary
      parameters:
        - $ref: '#/components/parameters/TourIdParam'
      responses:
        '200':
          description: Summary generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourSummaryResponse'

  /mobile/tours/active:
    get:
      tags: [tours]
      operationId: getActiveMobileTours
      summary: Get all published tours for mobile execution
      responses:
        '200':
          description: Active published tours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourListResponse'

  # ── Tour Stops ──────────────────────────────────────────────────────────────
  /tour-stops/{stopId}:
    get:
      tags: [tourStops]
      operationId: getTourStop
      summary: Get a single tour stop with details
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Tour stop details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopDetailResponse'
    put:
      tags: [tourStops]
      operationId: updateTourStop
      summary: Update a tour stop (ratings, flags, etc.)
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTourStopRequest'
      responses:
        '200':
          description: Tour stop updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopResponse'
    delete:
      tags: [tourStops]
      operationId: deleteTourStop
      summary: Remove a stop from the tour
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '204':
          description: Stop removed

  /tour-stops/{stopId}/arrive:
    post:
      tags: [tourStops]
      operationId: markStopArrived
      summary: Mark arrival at a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Arrival recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopResponse'

  /tour-stops/{stopId}/complete:
    post:
      tags: [tourStops]
      operationId: markStopCompleted
      summary: Mark a stop as completed
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Stop completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopResponse'

  /tour-stops/{stopId}/note:
    post:
      tags: [tourStops]
      operationId: addStopNote
      summary: Add a typed note to a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStopNoteRequest'
      responses:
        '200':
          description: Note added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourStopResponse'

  /tour-stops/{stopId}/summarize:
    post:
      tags: [tourStops]
      operationId: summarizeProperty
      summary: Generate an AI property summary for a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Summary generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertySummaryResponse'

  # ── Showing Requests ────────────────────────────────────────────────────────
  /tour-stops/{stopId}/showing-request:
    get:
      tags: [showings]
      operationId: getShowingRequest
      summary: Get the showing request for a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Showing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowingRequestResponse'
    post:
      tags: [showings]
      operationId: createShowingRequest
      summary: Create a showing request for a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShowingRequestBody'
      responses:
        '201':
          description: Showing request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowingRequestResponse'
    put:
      tags: [showings]
      operationId: updateShowingRequest
      summary: Update a showing request (status, notes, agent info)
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShowingRequestBody'
      responses:
        '200':
          description: Showing request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowingRequestResponse'

  /tour-stops/{stopId}/restrictions:
    get:
      tags: [showings]
      operationId: getRestrictionNote
      summary: Get restriction notes for a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      responses:
        '200':
          description: Restriction notes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictionNoteResponse'
    put:
      tags: [showings]
      operationId: upsertRestrictionNote
      summary: Create or update restriction notes for a stop
      parameters:
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRestrictionNoteBody'
      responses:
        '200':
          description: Restriction notes saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestrictionNoteResponse'

  # ── Voice Notes ─────────────────────────────────────────────────────────────
  /voice-notes/upload:
    post:
      tags: [voiceNotes]
      operationId: uploadVoiceNote
      summary: Upload a voice recording (multipart/form-data)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [tourStopId, audio]
              properties:
                tourStopId:
                  type: string
                audio:
                  type: string
                  format: binary
                durationSeconds:
                  type: integer
      responses:
        '201':
          description: Voice note uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceNoteResponse'

  /voice-notes/{voiceNoteId}/transcribe:
    post:
      tags: [voiceNotes]
      operationId: transcribeVoiceNote
      summary: Trigger transcription for a voice note
      parameters:
        - $ref: '#/components/parameters/VoiceNoteIdParam'
      responses:
        '200':
          description: Transcription job started or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceNoteResponse'

  /voice-notes/{voiceNoteId}:
    get:
      tags: [voiceNotes]
      operationId: getVoiceNote
      summary: Get a voice note and its transcript
      parameters:
        - $ref: '#/components/parameters/VoiceNoteIdParam'
      responses:
        '200':
          description: Voice note details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceNoteDetailResponse'

  # ── Admin AI Config ─────────────────────────────────────────────────────────
  /admin/ai/config:
    get:
      tags: [admin]
      operationId: getAiConfig
      summary: Get AI provider configuration
      responses:
        '200':
          description: AI config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConfigResponse'
    post:
      tags: [admin]
      operationId: saveAiConfig
      summary: Save AI provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAiConfigRequest'
      responses:
        '200':
          description: Config saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConfigResponse'

  /admin/ai/config/test:
    post:
      tags: [admin]
      operationId: testAiConfig
      summary: Test AI provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestAiConfigRequest'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTestResponse'

  /admin/ai/health:
    get:
      tags: [admin]
      operationId: getAiHealth
      summary: Get AI provider health status
      responses:
        '200':
          description: AI health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiHealthResponse'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    PropertyIdParam:
      name: propertyId
      in: path
      required: true
      schema:
        type: string
    BuyerIdParam:
      name: buyerId
      in: path
      required: true
      schema:
        type: string
    TourIdParam:
      name: tourId
      in: path
      required: true
      schema:
        type: string
    StopIdParam:
      name: stopId
      in: path
      required: true
      schema:
        type: string
    VoiceNoteIdParam:
      name: voiceNoteId
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Auth schemas ──────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [agent, assistant, admin]
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Standalone Property CRUD schemas ─────────────────────────────────────
    PropertyListResponse:
      type: object
      required: [properties]
      properties:
        properties:
          type: array
          items:
            $ref: '#/components/schemas/Property'
    PropertyResponse:
      type: object
      required: [property]
      properties:
        property:
          $ref: '#/components/schemas/Property'
    CreatePropertyBody:
      type: object
      required: [formattedAddress]
      properties:
        formattedAddress:
          type: string
        placeId:
          type: string
        lat:
          type: number
        lng:
          type: number
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        mlsId:
          type: string
        listPrice:
          type: integer
        beds:
          type: integer
        baths:
          type: number
        squareFeet:
          type: integer
        nickname:
          type: string
        notes:
          type: string
    UpdatePropertyBody:
      type: object
      properties:
        formattedAddress:
          type: string
        placeId:
          type: string
        lat:
          type: number
        lng:
